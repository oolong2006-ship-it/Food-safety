  <meta name="keywords" content="سلامة الغذاء, تفتيش الغذاء, HACCP, GMP, CAPA, SFDA, جاهزية التفتيش, مطاعم, كافيه, مصانع غذاء, المملكة العربية السعودية" />

<body>
  <!-- شاشة تسجيل الدخول -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <img class="login-logo" src="assets/icons/logo.png" alt="تفتيش — برنامج سلامة الغذاء والتفتيش الإلكتروني" />
        <p>منصة إدارة الجودة والتفتيش الإلكتروني للمنشآت الغذائية</p>
      </div>
      <div class="login-roles">

        <button class="role-btn" data-role="مدير الجودة">👔 مدير الجودة</button>
        <button class="role-btn" data-role="مشرف سلامة غذاء">🧪 مشرف سلامة الغذاء</button>

    <aside class="sidebar" id="sidebar">

      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <div class="user-badge" id="user-badge"></div>
        <button class="btn-ghost" id="logout-btn"><span class="lo-ic"></span> تسجيل الخروج</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="icon-btn" id="menu-toggle" aria-label="القائمة">☰</button>
        <div class="topbar-title" id="page-title">لوحة المعلومات</div>
        <div class="topbar-actions">
          <span class="today-chip" id="today-chip"></span>
          <button class="branch-chip hidden" id="branch-chip" title="الفرع الحالي" aria-label="الفرع الحالي"></button>
          <div class="kebab-wrap">
            <button class="icon-btn" id="kebab-btn" title="المزيد" aria-label="المزيد" aria-haspopup="true"></button>
            <div class="kebab-menu hidden" id="kebab-menu" role="menu">
              <button id="export-btn" role="menuitem"><span class="km-ic"></span> تصدير نسخة احتياطية</button>
              <button id="import-btn" role="menuitem"><span class="km-ic"></span> استيراد نسخة احتياطية</button>
            </div>
          </div>
          <input type="file" id="import-file" accept="application/json" hidden />
        </div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modal-title">عنوان</h3>
        <button class="icon-btn" id="modal-close" aria-label="إغلاق">✕</button>

      <div class="modal-body" id="modal-body"></div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script src="assets/js/nutrition.js?v=12"></script>
  <script src="assets/js/ai.js?v=12"></script>
  <script src="assets/js/ui.js?v=12"></script>
  <!-- الوضع السحابي (SaaS) — اختياري: يُفعَّل عند ضبط config.js -->

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => { /* غير متاح */ });
      });
    }
